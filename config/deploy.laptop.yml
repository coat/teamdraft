# Kamal config for laptop-driven deploys to teamdraft.party. Run with:
#
#   bundle exec kamal deploy -c config/deploy.laptop.yml
#
# The default `config/deploy.yml` is wired for the CI deploy path (image
# pulled from GHCR after the release workflow publishes it). This file
# uses the self-hosted Docker registry at registry.teamdraft.party and
# builds locally, so a `kamal deploy` from your laptop can build, push,
# and deploy without needing CI to have run first.

service: teamdraft

# Kamal prepends `registry.server` automatically - do not include
# `registry.teamdraft.party/` here.
image: teamdraft

servers:
  web:
    hosts:
      - teamdraft.party

proxy:
  ssl: false        # nginx handles TLS
  app_port: 3000    # Puma inside the container
  healthcheck:
    path: /up
  run:
    http_port: 8080

# Self-hosted Docker Registry v2 fronted by nginx with htpasswd auth.
# Both the laptop (push) and the server (pull) authenticate with the same
# credentials, loaded from .kamal/secrets.
registry:
  server: registry.teamdraft.party
  username:
    - KAMAL_REGISTRY_USERNAME
  password:
    - KAMAL_REGISTRY_PASSWORD

# Build the image on this machine and push to GHCR. Switch to a remote
# builder if your laptop's arch differs from the server's (i.e. you're on
# arm64 and the server is amd64 with no QEMU set up).
builder:
  arch: amd64
  local: true

ssh:
  user: teamdraft

env:
  clear:
    SOLID_QUEUE_IN_PUMA: "1"
    RAILS_LOG_TO_STDOUT: "1"
    RAILS_SERVE_STATIC_FILES: "1"
    DB_HOST: teamdraft-postgres
  secret:
    - RAILS_MASTER_KEY
    - TEAMDRAFT_DATABASE_PASSWORD
    - THESPORTSDB_KEY
    - MONEYLINE_API_KEY

logging:
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

accessories:
  postgres:
    image: postgres:17
    host: teamdraft.party
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_USER: teamdraft
        POSTGRES_DB: teamdraft_production
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data

asset_path: /rails/public/assets
